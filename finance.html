<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #0f1117; 
            color: #e1e4e8; 
            min-height: 100vh;
        }
        .header { 
            background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%); 
            padding: 22px 32px; 
            border-bottom: 1px solid #21262d; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .header p { color: #8b949e; font-size: 0.82rem; margin-top: 3px; }
        .tabs { display: flex; gap: 4px; padding: 0 32px; background: #161b22; border-bottom: 1px solid #21262d; }
        .tab { 
            padding: 12px 20px; 
            cursor: pointer; 
            font-size: 0.88rem; 
            color: #8b949e; 
            border-bottom: 2px solid transparent; 
            transition: all 0.2s;
        }
        .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
        .content { padding: 24px 32px; max-width: 1400px; }
        .month-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .month-btn { 
            padding: 6px 18px; 
            border-radius: 20px; 
            border: 1px solid #30363d; 
            background: transparent; 
            color: #8b949e; 
            cursor: pointer; 
            font-size: 0.83rem; 
            transition: all 0.2s;
        }
        .month-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; font-weight: 600; }
        .grid { display: grid; gap: 16px; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
        .card-title { font-size: 0.72rem; text-transform: uppercase; color: #6e7681; margin-bottom: 10px; font-weight: 600; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #fff; }
        .stat-sub { font-size: 0.8rem; color: #8b949e; margin-top: 6px; }
        .section-label { font-size: 0.95rem; font-weight: 600; color: #c9d1d9; margin: 24px 0 12px; }
        .chart-card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
        .chart-wrap { position: relative; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
        th { text-align: left; padding: 10px 14px; border-bottom: 1px solid #21262d; color: #6e7681; font-weight: 600; font-size: 0.72rem; }
        td { padding: 10px 14px; border-bottom: 1px solid #0d1117; }
        tr:hover td { background: #1c2128; }
        .amount { font-weight: 600; }
        .text-right { text-align: right; }
        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .grid-4, .grid-2 { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; }
            .tabs { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>💰 Finance Dashboard</h1>
            <p>Calum's personal cashflow tracker</p>
        </div>
        <div style="text-align: right;">
            <p class="stat-sub" id="updated-label">Updated: Apr 4, 2026</p>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('overview')">Overview</div>
        <div class="tab" onclick="switchTab('categories')">Categories</div>
        <div class="tab" onclick="switchTab('transactions')">Transactions</div>
    </div>

    <div class="content">
        <!-- OVERVIEW TAB -->
        <div id="tab-overview" class="tab-panel" style="display: block;">
            <div class="month-select" id="month-buttons"></div>
            <div class="grid grid-4" id="stats-grid" style="margin-bottom: 20px;"></div>
            <div class="grid grid-2" style="margin-bottom: 20px;">
                <div class="chart-card">
                    <h3 class="card-title">Spending by Category</h3>
                    <div class="chart-wrap"><canvas id="chart-pie"></canvas></div>
                </div>
            </div>
            <div class="section-label">📊 Recent Transactions</div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Day</th>
                                <th>Description</th>
                                <th>Account</th>
                                <th>Category</th>
                                <th class="text-right">Amount (AED)</th>
                            </tr>
                        </thead>
                        <tbody id="recent-txs"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- CATEGORIES TAB -->
        <div id="tab-categories" class="tab-panel" style="display: none;">
            <div class="month-select" id="cat-month-buttons"></div>
            <div class="grid grid-2" id="category-breakdown"></div>
        </div>

        <!-- TRANSACTIONS TAB -->
        <div id="tab-transactions" class="tab-panel" style="display: none;">
            <div class="filters" style="margin-bottom: 16px;">
                <input type="text" id="search-input" class="filter-input" placeholder="🔍 Search..." style="padding: 8px 12px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #e1e4e8;">
                <select id="month-filter" class="filter-input" style="padding: 8px 12px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #e1e4e8;">
                    <option value="">All Months</option>
                </select>
            </div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Account</th>
                                <th>Category</th>
                                <th class="text-right">Amount (AED)</th>
                            </tr>
                        </thead>
                        <tbody id="all-txs"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const transactionsData = {
  "Jan 26": {
    "transactions": [
      {
        "month": "Jan 26",
        "day": 1,
        "description": "Futures",
        "account": "Binance",
        "amount": 720,
        "category": "Gambling"
      }
    ],
    "total": 36556.68,
    "by_category": {
      "Gambling": 720
    }
  },
  "Feb 26": {
    "transactions": [],
    "total": 39420.12,
    "by_category": {}
  },
  "Mar 26": {
    "transactions": [],
    "total": 46608.86,
    "by_category": {}
  },
  "Apr 26": {
    "transactions": [
      {"month": "Apr 26", "day": 1, "description": "DAILY OD INT", "account": "BoS", "amount": 2.76, "category": "Fees"},
      {"month": "Apr 26", "day": 1, "description": "RETURNED DD", "account": "BoS", "amount": 28.25, "category": "Other"},
      {"month": "Apr 26", "day": 1, "description": "RETURNED DD", "account": "BoS", "amount": 118.62, "category": "Other"},
      {"month": "Apr 26", "day": 1, "description": "AGRIA PET INS", "account": "BoS", "amount": 118.62, "category": "Health"},
      {"month": "Apr 26", "day": 1, "description": "PET HEALTH CLUB", "account": "BoS", "amount": 28.25, "category": "Health"},
      {"month": "Apr 26", "day": 2, "description": "DAILY OD INT", "account": "BoS", "amount": 2.09, "category": "Fees"},
      {"month": "Apr 26", "day": 2, "description": "TESCO BANK", "account": "BoS", "amount": 268.00, "category": "Loan"},
      {"month": "Apr 26", "day": 2, "description": "FLAHER TV", "account": "BoS", "amount": 1000.00, "category": "Life"},
      {"month": "Apr 26", "day": 2, "description": "NIUM FINTECH LIMIT", "account": "BoS", "amount": 200.00, "category": "Other"},
      {"month": "Apr 26", "day": 2, "description": "MBNA LIMITED", "account": "BoS", "amount": 192.34, "category": "Loan"},
      {"month": "Apr 26", "day": 7, "description": "DAILY OD INT 03/04", "account": "BoS", "amount": 2.09, "category": "Fees"}
    ],
    "total": 1961.02,
    "by_category": {
      "Fees": 7.94,
      "Other": 346.87,
      "Health": 146.87,
      "Loan": 460.34,
      "Life": 1000.00
    }
  }
};

        let currentMonth = "Apr 26";
        let pieChart = null;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).style.display = 'block';
            event.target.classList.add('active');
            
            if (tabName === 'overview') renderOverview();
            if (tabName === 'categories') renderCategories();
            if (tabName === 'transactions') renderAllTransactions();
        }

        function renderOverview() {
            const data = transactionsData[currentMonth];
            const statsHtml = `
                <div class="card">
                    <div class="card-title">Total Spent</div>
                    <div class="stat-value">AED ${data.total.toLocaleString('en-US', {maximumFractionDigits: 2})}</div>
                </div>
                <div class="card">
                    <div class="card-title">Transactions</div>
                    <div class="stat-value">${data.transactions.length}</div>
                </div>
                <div class="card">
                    <div class="card-title">Avg Transaction</div>
                    <div class="stat-value">AED ${(data.total / (data.transactions.length || 1)).toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                </div>
                <div class="card">
                    <div class="card-title">Categories</div>
                    <div class="stat-value">${Object.keys(data.by_category).length}</div>
                </div>
            `;
            document.getElementById('stats-grid').innerHTML = statsHtml;

            // Month buttons
            const monthButtons = Object.keys(transactionsData).map(month => 
                `<button class="month-btn ${month === currentMonth ? 'active' : ''}" onclick="switchMonth('${month}')">${month}</button>`
            ).join('');
            document.getElementById('month-buttons').innerHTML = monthButtons;

            // Recent transactions
            const recentHtml = data.transactions.slice(0, 10).map(tx => `
                <tr>
                    <td>${tx.day}</td>
                    <td>${tx.description}</td>
                    <td>${tx.account}</td>
                    <td>${tx.category}</td>
                    <td class="text-right amount">AED ${tx.amount.toFixed(2)}</td>
                </tr>
            `).join('');
            document.getElementById('recent-txs').innerHTML = recentHtml || '<tr><td colspan="5" style="text-align: center; color: #8b949e;">No transactions</td></tr>';

            // Pie chart
            if (pieChart) pieChart.destroy();
            const ctx = document.getElementById('chart-pie');
            if (ctx && Object.keys(data.by_category).length > 0) {
                pieChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data.by_category),
                        datasets: [{
                            data: Object.values(data.by_category),
                            backgroundColor: ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#8957e5'],
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#e1e4e8' } } } }
                });
            }
        }

        function renderCategories() {
            const data = transactionsData[currentMonth];
            const catHtml = Object.entries(data.by_category).map(([cat, amount]) => `
                <div class="card">
                    <div class="card-title">${cat}</div>
                    <div class="stat-value">AED ${amount.toLocaleString('en-US', {maximumFractionDigits: 2})}</div>
                </div>
            `).join('');
            document.getElementById('category-breakdown').innerHTML = catHtml || '<p style="color: #8b949e;">No transactions</p>';
        }

        function renderAllTransactions() {
            let allTxs = [];
            Object.entries(transactionsData).forEach(([month, data]) => {
                allTxs = allTxs.concat(data.transactions);
            });
            
            const txHtml = allTxs.map(tx => `
                <tr>
                    <td>${tx.month} day ${tx.day}</td>
                    <td>${tx.description}</td>
                    <td>${tx.account}</td>
                    <td>${tx.category}</td>
                    <td class="text-right amount">AED ${tx.amount.toFixed(2)}</td>
                </tr>
            `).join('');
            document.getElementById('all-txs').innerHTML = txHtml;
        }

        function switchMonth(month) {
            currentMonth = month;
            document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderOverview();
        }

        // Initialize
        renderOverview();
    </script>
</body>
</html>
