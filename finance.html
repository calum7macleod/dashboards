<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%); padding: 22px 32px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .header p { color: #8b949e; font-size: 0.82rem; margin-top: 3px; }
    .tabs { display: flex; gap: 4px; padding: 0 32px; background: #161b22; border-bottom: 1px solid #21262d; }
    .tab { padding: 12px 20px; cursor: pointer; font-size: 0.88rem; color: #8b949e; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .content { padding: 24px 32px; max-width: 1400px; }
    .month-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .month-btn { padding: 6px 18px; border-radius: 20px; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; font-size: 0.83rem; transition: all 0.2s; }
    .month-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; font-weight: 600; }
    .grid { display: grid; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
    .card-title { font-size: 0.72rem; text-transform: uppercase; color: #6e7681; margin-bottom: 10px; font-weight: 600; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #fff; }
    .stat-sub { font-size: 0.8rem; color: #8b949e; margin-top: 6px; }
    .section-label { font-size: 0.95rem; font-weight: 600; color: #c9d1d9; margin: 24px 0 12px; }
    .chart-card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
    .chart-wrap { position: relative; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th { text-align: left; padding: 10px 14px; border-bottom: 1px solid #21262d; color: #6e7681; font-weight: 600; font-size: 0.72rem; }
    td { padding: 10px 14px; border-bottom: 1px solid #0d1117; }
    tr:hover td { background: #1c2128; }
    .text-right { text-align: right; }
    .amount { font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    @media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .grid-4, .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>💰 Finance Dashboard</h1>
      <p>Calum's personal cashflow tracker</p>
    </div>
    <div style="text-align: right;">
      <p class="stat-sub" id="updated">Built: Apr 5, 2026</p>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')">Overview</div>
    <div class="tab" onclick="switchTab('categories')">Categories</div>
    <div class="tab" onclick="switchTab('transactions')">Transactions</div>
  </div>

  <div class="content">
    <!-- Overview Tab -->
    <div id="tab-overview" class="tab-panel active">
      <div class="month-select" id="month-btns"></div>
      <div class="grid grid-4" id="stats-grid" style="margin-bottom: 20px;"></div>
      <div class="grid grid-2" style="margin-bottom: 20px;">
        <div class="chart-card">
          <h3 class="card-title">Spending by Category</h3>
          <div class="chart-wrap"><canvas id="chart-pie"></canvas></div>
        </div>
        <div class="chart-card">
          <h3 class="card-title">Budget vs Actual</h3>
          <div class="chart-wrap"><canvas id="chart-budget"></canvas></div>
        </div>
      </div>
      <div class="section-label">Recent Transactions</div>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Day</th><th>Description</th><th>Account</th><th>Category</th><th class="text-right">Amount (AED)</th></tr></thead>
            <tbody id="recent-txs"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Categories Tab -->
    <div id="tab-categories" class="tab-panel">
      <div class="month-select" id="cat-month-btns"></div>
      <div class="grid grid-2" id="cat-grid"></div>
    </div>

    <!-- Transactions Tab -->
    <div id="tab-transactions" class="tab-panel">

            <tbody id="all-txs"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

    let currentMonth = 'Apr 26';
    let pieChart = null;
    let budgetChart = null;

    // ========== UI FUNCTIONS ==========
    function switchTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      event.target.classList.add('active');
      if (name === 'overview') renderOverview();
      if (name === 'categories') renderCategories();
      if (name === 'transactions') renderTransactions();
    }

    function switchMonth(m) {
      currentMonth = m;
      document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderOverview();
      renderCategories();
    }

    function renderOverview() {
      const data = monthData[currentMonth];
      const stat = stats[currentMonth];

      // Stats cards
      document.getElementById('stats-grid').innerHTML = `
        <div class="card">
          <div class="card-title">Total Spent</div>
          <div class="stat-value">AED ${stat.total.toLocaleString('en-US', {maximumFractionDigits: 2})}</div>
        </div>
        <div class="card">
          <div class="card-title">Transactions</div>
          <div class="stat-value">${stat.count}</div>
        </div>
        <div class="card">
          <div class="card-title">Avg Transaction</div>
          <div class="stat-value">AED ${stat.average.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
        </div>
        <div class="card">
          <div class="card-title">Categories</div>
          <div class="stat-value">${stat.categories}</div>
        </div>
      `;

      // Month buttons
      document.getElementById('month-btns').innerHTML = Object.keys(monthData).map(m =>
        `<button class="month-btn ${m === currentMonth ? 'active' : ''}" onclick="switchMonth('${m}')">${m}</button>`
      ).join('');

      // Recent transactions
      const recent = data.transactions.slice(0, 15).map(t =>
        `<tr><td>${t.day}</td><td>${t.description}</td><td>${t.account}</td><td>${t.category}</td><td class="text-right amount">AED ${(t.amount || 0).toFixed(2)}</td></tr>`
      ).join('') || '<tr><td colspan="5" style="text-align: center; color: #8b949e;">No transactions</td></tr>';
      document.getElementById('recent-txs').innerHTML = recent;

      // Pie chart
      if (pieChart) pieChart.destroy();
      const ctx = document.getElementById('chart-pie');
      if (ctx && Object.keys(data.byCategory).length > 0) {
        pieChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: Object.keys(data.byCategory),
            datasets: [{
              data: Object.values(data.byCategory),
              backgroundColor: ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#8957e5', '#79c0ff', '#56d364']
            }]
          },
          options: { responsive: true, plugins: { legend: { labels: { color: '#e1e4e8' } } } }
        });
      }

      // Budget chart
      if (budgetChart) budgetChart.destroy();
      const budgetCtx = document.getElementById('chart-budget');
      if (budgetCtx) {
        budgetChart = new Chart(budgetCtx, {
          type: 'bar',
          data: {
            labels: ['Budget', 'Actual'],
            datasets: [{
              label: 'AED',
              data: [stat.budget, stat.total],
              backgroundColor: ['#3fb950', stat.total > stat.budget ? '#f85149' : '#58a6ff']
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#e1e4e8' } } },
            scales: { y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } } }
          }
        });
      }
    }

    function renderCategories() {
      const data = monthData[currentMonth];
      document.getElementById('cat-month-btns').innerHTML = Object.keys(monthData).map(m =>
        `<button class="month-btn ${m === currentMonth ? 'active' : ''}" onclick="switchMonth('${m}')">${m}</button>`
      ).join('');

      const catHtml = Object.entries(data.byCategory).map(([cat, amt]) =>
        `<div class="card"><div class="card-title">${cat}</div><div class="stat-value">AED ${amt.toLocaleString('en-US', {maximumFractionDigits: 2})}</div></div>`
      ).join('');
      document.getElementById('cat-grid').innerHTML = catHtml || '<p style="color: #8b949e;">No data</p>';
    }

    function renderTransactions() {
      let allTxs = [];
      Object.values(monthData).forEach(m => allTxs = allTxs.concat(m.transactions));
      const search = document.getElementById('search').value.toLowerCase();
      const filtered = allTxs.filter(t =>
        t.description.toLowerCase().includes(search) ||
        t.account.toLowerCase().includes(search) ||
        t.category.toLowerCase().includes(search)
      );

      const html = filtered.map(t =>
        `<tr><td>${t.month} day ${t.day}</td><td>${t.description}</td><td>${t.account}</td><td>${t.category}</td><td class="text-right amount">AED ${(t.amount || 0).toFixed(2)}</td></tr>`
      ).join('') || '<tr><td colspan="5" style="text-align: center; color: #8b949e;">No results</td></tr>';
      document.getElementById('all-txs').innerHTML = html;
    }

    document.getElementById('search').addEventListener('input', renderTransactions);
    renderOverview();
  </script>
