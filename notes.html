<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes & Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%); padding: 20px 28px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 1.4rem; font-weight: 700; }
  .header p { color: #8b949e; font-size: 0.8rem; margin-top: 2px; }
  .main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 20px 24px; max-width: 1400px; }
  .panel { background: #161b22; border: 1px solid #21262d; border-radius: 12px; display: flex; flex-direction: column; min-height: 400px; }
  .panel-header { padding: 14px 16px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; }
  .panel-body { flex: 1; overflow-y: auto; padding: 10px; }
  .add-btn { padding: 5px 12px; border-radius: 6px; border: none; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .add-btn:hover { filter: brightness(1.2); }

  /* TASKS */
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px; border-radius: 8px; margin-bottom: 4px; transition: background 0.15s; cursor: pointer; }
  .task:hover { background: #1c2128; }
  .task-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid #30363d; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
  .task-check.done { background: #3fb950; border-color: #3fb950; }
  .task-check.done::after { content: '✓'; color: #000; font-size: 10px; font-weight: 900; }
  .task-text { font-size: 0.84rem; line-height: 1.4; flex: 1; }
  .task.done .task-text { text-decoration: line-through; color: #6e7681; }
  .task-priority { font-size: 0.65rem; padding: 1px 6px; border-radius: 8px; font-weight: 700; flex-shrink: 0; }
  .p-high { background: #3d1f1f; color: #f85149; }
  .p-med { background: #302a1c; color: #e3b341; }
  .p-low { background: #21262d; color: #6e7681; }
  .task-del { opacity: 0; font-size: 0.75rem; color: #6e7681; cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
  .task:hover .task-del { opacity: 1; }
  .task-del:hover { color: #f85149; background: #3d1f1f; }

  /* NOTES */
  .note { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 12px; margin-bottom: 8px; position: relative; }
  .note-title { font-size: 0.8rem; font-weight: 700; color: #e1e4e8; margin-bottom: 5px; }
  .note-body { font-size: 0.78rem; color: #8b949e; line-height: 1.5; white-space: pre-wrap; }
  .note-date { font-size: 0.65rem; color: #6e7681; margin-top: 6px; }
  .note-tag { display: inline-block; font-size: 0.65rem; padding: 1px 6px; border-radius: 8px; margin-right: 4px; font-weight: 600; }
  .note-del { position: absolute; top: 8px; right: 8px; font-size: 0.75rem; color: #6e7681; cursor: pointer; opacity: 0; padding: 2px 5px; border-radius: 4px; }
  .note:hover .note-del { opacity: 1; }
  .note-del:hover { color: #f85149; background: #3d1f1f; }

  /* PINNED */
  .pin { background: #1c2128; border: 1px solid #e3b34133; border-radius: 8px; padding: 12px; margin-bottom: 8px; position: relative; }
  .pin-title { font-size: 0.78rem; font-weight: 700; color: #e3b341; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .pin-body { font-size: 0.78rem; color: #8b949e; line-height: 1.5; white-space: pre-wrap; }
  .pin-del { position: absolute; top: 8px; right: 8px; font-size: 0.75rem; color: #6e7681; cursor: pointer; opacity: 0; }
  .pin:hover .pin-del { opacity: 1; }

  /* Input */
  .quick-input { display: flex; gap: 6px; padding: 10px; border-top: 1px solid #21262d; }
  .quick-input input, .quick-input select { flex: 1; padding: 7px 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 7px; color: #e1e4e8; font-size: 0.82rem; outline: none; }
  .quick-input input:focus, .quick-input select:focus { border-color: #58a6ff; }
  .quick-input select { max-width: 80px; cursor: pointer; }
  .go-btn { padding: 7px 14px; background: #1f6feb; border: none; border-radius: 7px; color: #fff; font-size: 0.8rem; font-weight: 700; cursor: pointer; flex-shrink: 0; }
  .go-btn:hover { background: #388bfd; }

  .empty { text-align: center; color: #6e7681; font-size: 0.78rem; padding: 30px; }

  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .main { padding: 12px; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📝 Notes & Tasks</h1>
    <p>Your personal notepad · everything in one place</p>
  </div>
  <div style="color:#6e7681;font-size:0.75rem" id="last-saved"></div>
</div>

<div class="main">

  <!-- TASKS -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" style="color:#58a6ff">✅ Tasks</span>
      <span id="task-count" style="font-size:0.72rem;color:#6e7681"></span>
    </div>
    <div class="panel-body" id="tasks-body"></div>
    <div class="quick-input">
      <input type="text" id="task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">
      <select id="task-priority">
        <option value="high">🔴</option>
        <option value="med" selected>🟡</option>
        <option value="low">⚪</option>
      </select>
      <button class="go-btn" onclick="addTask()">Add</button>
    </div>
  </div>

  <!-- NOTES -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" style="color:#3fb950">📋 Notes</span>
      <button class="add-btn" style="background:#3fb95022;color:#3fb950" onclick="addNote()">+ Note</button>
    </div>
    <div class="panel-body" id="notes-body"></div>
  </div>

  <!-- PINNED / REMEMBER -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" style="color:#e3b341">📌 Remember</span>
      <button class="add-btn" style="background:#e3b34122;color:#e3b341" onclick="addPin()">+ Pin</button>
    </div>
    <div class="panel-body" id="pins-body"></div>
  </div>

</div>

<script>
// Storage
function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
  document.getElementById('last-saved').textContent = 'Saved ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
}

let tasks = load('tasks', [
  { id:1, text:'Call Dan — 6 bed cash buyer AED 6.3M', done:false, priority:'high', created:'30 Mar' },
  { id:2, text:'Find unit for Anne-Marie — top single row Costa/Portofino 2.8M mortgage', done:false, priority:'high', created:'30 Mar' },
  { id:3, text:'Amr viewing today — Santorini inside, Costa outside', done:false, priority:'high', created:'30 Mar' },
  { id:4, text:'Hasnain meeting this week — push budget higher', done:false, priority:'med', created:'30 Mar' },
  { id:5, text:'Replace CalumBot v3 EA on MT4 (updated London open time)', done:false, priority:'med', created:'29 Mar' },
  { id:6, text:'Set MT4 power settings — never sleep', done:false, priority:'med', created:'29 Mar' },
  { id:7, text:'Set up Airtable content pipeline', done:false, priority:'low', created:'29 Mar' },
  { id:8, text:'Send ADIB Mar 26 statement to Max', done:false, priority:'low', created:'29 Mar' },
]);

let notes = load('notes', [
  { id:1, title:'Amr — Viewing 30 Mar', body:'Santorini inside unit first, then outside Costa single row\nBudget ~2.7M, mortgage, 4 bed', tags:['RE','Buyer'], date:'30 Mar' },
  { id:2, title:'Anne-Marie — HOT', body:'Form B done. Was going to sign last weekend — sent wrong unit.\nNeeds: top single row Costa or Portofino, 2.8M max, mortgage\nFind this ASAP', tags:['RE','Urgent'], date:'30 Mar' },
  { id:3, title:'Trading bot — key info', body:'CalumBot v3 on Fusion Markets MT4\nAccount: 2059477\nLondon open: 11am Dubai (7am GMT after BST change)\nNY open: 5:30pm Dubai\n10 pairs trading', tags:['Trading'], date:'29 Mar' },
]);

let pins = load('pins', [
  { id:1, title:'🏆 2026 Board Target', body:'AED 3,000,000 total board\nAED 1,800,000 take home\nAED 250,000 per month' },
  { id:2, title:'💰 Net Worth Today', body:'AED ~813,000 = £168,000\nAs of 29 Mar 2026\nMain asset: NC500 Pods 50% stake (£250k)' },
  { id:3, title:'📱 Post every Monday 9am', body:'Your peak audience time.\nFilm Friday mornings.\nThursday: scripts from Max.' },
  { id:4, title:'📌 Anne-Marie unit needed', body:'Top single row Costa or Portofino\nMax 2.8M mortgage\nForm B done — ready to close NOW' },
]);

let nextId = Math.max(...tasks.map(t=>t.id), ...notes.map(n=>n.id), ...pins.map(p=>p.id), 0) + 1;

// TASKS
function renderTasks() {
  const body = document.getElementById('tasks-body');
  const active = tasks.filter(t=>!t.done);
  const done = tasks.filter(t=>t.done);
  const sorted = [...active, ...done];
  
  if(!sorted.length) { body.innerHTML = '<div class="empty">No tasks — add one below</div>'; return; }
  
  const prioMap = { high: 'p-high', med: 'p-med', low: 'p-low' };
  const prioLabel = { high: 'HIGH', med: 'MED', low: 'LOW' };
  
  body.innerHTML = sorted.map(t => `
    <div class="task ${t.done?'done':''}" onclick="toggleTask(${t.id})">
      <div class="task-check ${t.done?'done':''}"></div>
      <div class="task-text">${t.text}</div>
      <span class="task-priority ${prioMap[t.priority]}">${prioLabel[t.priority]}</span>
      <span class="task-del" onclick="event.stopPropagation();deleteTask(${t.id})">✕</span>
    </div>`).join('');
  
  document.getElementById('task-count').textContent = active.length + ' remaining';
}

function addTask() {
  const input = document.getElementById('task-input');
  const priority = document.getElementById('task-priority').value;
  const text = input.value.trim();
  if(!text) return;
  tasks.unshift({ id: nextId++, text, done: false, priority, created: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}) });
  save('tasks', tasks);
  input.value = '';
  renderTasks();
}

function toggleTask(id) {
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  save('tasks', tasks);
  renderTasks();
}

function deleteTask(id) {
  if(!confirm('Delete this task?')) return;
  tasks = tasks.filter(t => t.id!==id);
  save('tasks', tasks);
  renderTasks();
}

// NOTES
function renderNotes() {
  const body = document.getElementById('notes-body');
  if(!notes.length) { body.innerHTML = '<div class="empty">No notes yet</div>'; return; }
  const tagColors = {'RE':'#58a6ff22','Urgent':'#f8514922','Trading':'#e3b34122','Finance':'#3fb95022','Content':'#d2a8ff22'};
  const tagText =   {'RE':'#58a6ff','Urgent':'#f85149','Trading':'#e3b341','Finance':'#3fb950','Content':'#d2a8ff'};
  body.innerHTML = notes.map(n => `
    <div class="note">
      <span class="note-del" onclick="deleteNote(${n.id})">✕</span>
      <div class="note-title">${n.title}</div>
      <div class="note-body">${n.body}</div>
      <div class="note-date">
        ${(n.tags||[]).map(t=>`<span class="note-tag" style="background:${tagColors[t]||'#21262d'};color:${tagText[t]||'#8b949e'}">${t}</span>`).join('')}
        ${n.date}
      </div>
    </div>`).join('');
}

function addNote() {
  const title = prompt('Note title:'); if(!title) return;
  const body = prompt('Note content:'); if(!body) return;
  const tagStr = prompt('Tags (comma separated, e.g. RE,Urgent):') || '';
  const tags = tagStr.split(',').map(t=>t.trim()).filter(Boolean);
  notes.unshift({ id: nextId++, title, body, tags, date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}) });
  save('notes', notes);
  renderNotes();
}

function deleteNote(id) {
  if(!confirm('Delete this note?')) return;
  notes = notes.filter(n => n.id!==id);
  save('notes', notes);
  renderNotes();
}

// PINS
function renderPins() {
  const body = document.getElementById('pins-body');
  if(!pins.length) { body.innerHTML = '<div class="empty">Nothing pinned yet</div>'; return; }
  body.innerHTML = pins.map(p => `
    <div class="pin">
      <span class="pin-del" onclick="deletePin(${p.id})">✕</span>
      <div class="pin-title">📌 ${p.title}</div>
      <div class="pin-body">${p.body}</div>
    </div>`).join('');
}

function addPin() {
  const title = prompt('What to remember:'); if(!title) return;
  const body = prompt('Details:') || '';
  pins.unshift({ id: nextId++, title, body });
  save('pins', pins);
  renderPins();
}

function deletePin(id) {
  pins = pins.filter(p => p.id!==id);
  save('pins', pins);
  renderPins();
}

// Init
renderTasks();
renderNotes();
renderPins();
</script>
</body>
</html>
