<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%); padding: 22px 32px; border-bottom: 1px solid #21262d; }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .content { padding: 24px 32px; max-width: 1400px; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
    .card p { color: #8b949e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📝 Notes & Tasks</h1>
  </div>
  <div class="content">
    <div class="card">
      <p>Notes and task management - coming soon</p>
    </div>
  </div>
</body>
</html>
