<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%); padding: 22px 32px; border-bottom: 1px solid #21262d; }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .header p { color: #8b949e; font-size: 0.82rem; }
    .content { padding: 24px 32px; max-width: 1400px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
    .card-title { font-size: 0.72rem; text-transform: uppercase; color: #6e7681; margin-bottom: 10px; font-weight: 600; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #fff; }
    .stat-sub { font-size: 0.8rem; color: #8b949e; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th { text-align: left; padding: 10px 14px; border-bottom: 1px solid #21262d; color: #6e7681; font-weight: 600; font-size: 0.72rem; }
    td { padding: 10px 14px; border-bottom: 1px solid #0d1117; }
    @media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>📈 Trading Dashboard</h1>
    <p>MT4 Performance & Trade History</p>
  </div>

  <div class="content">
    <div class="grid-4">
      <div class="card">
        <div class="card-title">Total Trades</div>
        <div class="stat-value">0</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="card">
        <div class="card-title">Total P&L</div>
        <div class="stat-value" style="color: #3fb950">$0</div>
        <div class="stat-sub">Cumulative</div>
      </div>
      <div class="card">
        <div class="card-title">Win Rate</div>
        <div class="stat-value">0%</div>
        <div class="stat-sub">0 / 0 winning</div>
      </div>
      <div class="card">
        <div class="card-title">Avg Trade</div>
        <div class="stat-value">$0.00</div>
        <div class="stat-sub">Per trade</div>
      </div>
    </div>

    <div class="card"><p style="color: #8b949e;">No trade data yet</p></div>
  </div>
</body>
</html>
